name: Trading Bot

on:
  schedule:
    # Run every 5 minutes on weekdays between 03:45 UTC and 10:00 UTC (9:15 AM to 3:30 PM IST)
    - cron: '45,50,55 3 * * 1-5'
    - cron: '*/5 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run trading bot
        env:
          TELEGRAM_BOT_TOKEN: "8792428947:AAFCJ2AP1y49AxHdb7vmGHQs1oRz8g7J6zo"
          TELEGRAM_CHAT_ID: "8792428947"
        run: |
          python main.py
