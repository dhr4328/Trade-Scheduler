name: Trading Bot GOLD

on:
  workflow_dispatch: # Manual trigger from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run trading bot (Gold)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_GOLD }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID_GOLD }}
        run: |
          python main.py --symbol "GC=F" --delay 5
