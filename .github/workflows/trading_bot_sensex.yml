name: Trading Bot SENSEX

on:
  schedule:
    # Starts once at 03:45 UTC (9:15 AM IST) on weekdays. 
    # The Python script will now loop continuously every 5 minutes until market close.
    - cron: '45 3 * * 1-5'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run trading bot
        env:
          TELEGRAM_BOT_TOKEN: "8792428947:AAFCJ2AP1y49AxHdb7vmGHQs1oRz8g7J6zo"
          TELEGRAM_CHAT_ID: "1112002477"
        run: |
          python main.py --symbol "^BSESN" --delay 25
